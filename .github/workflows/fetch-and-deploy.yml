name: Fetch News & Deploy

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (1 region, 3 articles)'
        required: false
        default: false
        type: boolean

concurrency:
  group: fetch-and-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────
  # Parallel region groups — each runs full pipeline and
  # pushes directly to Supabase. No fan-in needed.
  # ───────────────────────────────────────────────────────
  fetch-regions:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        batch:
          - name: batch-1
            regions: "iran,russia,turkey"
          - name: batch-2
            regions: "gulf,proxies,middle_east"
          - name: batch-3
            regions: "china,israel,south_asia,western"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: scripts/.venv
          key: poetry-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Python dependencies
        working-directory: scripts
        run: poetry install --no-interaction --no-root

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Playwright Chromium
        working-directory: scripts
        run: poetry run python -m playwright install chromium --with-deps

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: "Run pipeline: ${{ matrix.batch.name }} (${{ matrix.batch.regions }})"
        working-directory: scripts
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TEST_MODE: ${{ inputs.test_mode || 'false' }}
          LLM_CONCURRENCY: "8"
          LLM_CLASSIFY_CONCURRENCY: "5"
          PIPELINE_REGIONS: ${{ matrix.batch.regions }}
        run: poetry run python run_pipeline.py --steps fetch,translate,classify,geocode,threat

